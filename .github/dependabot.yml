version: 2
updates:
  # GitHub Actions is the only version-pinned dependency surface here — the tool
  # itself is stdlib python plus brew-installed fclones and npx-run pyright, none
  # of which has a manifest in the repo. Keep the action pins current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    # Let a release age in the ecosystem before Dependabot proposes the bump:
    # a regression or a poisoned tag usually surfaces within two weeks. The
    # github-actions ecosystem only accepts `default-days` (Dependabot rejects
    # the per-semver keys other ecosystems allow), so this one value applies
    # to patch, minor, and major bumps alike.
    cooldown:
      default-days: 14
